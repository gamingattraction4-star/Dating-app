# Render Blueprint — deploys the SparkMatch backend + a free PostgreSQL database
# together, in one place. In Render: New + → Blueprint → pick this repo.
services:
  - type: web
    name: sparkmatch-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_SEED_ENABLED
        value: "true"
      - key: REDIS_ENABLED
        value: "false"
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      # Database URL is wired automatically from the database below.
      - key: DATABASE_URL
        fromDatabase:
          name: sparkmatch-db
          property: connectionString
      # ---- Email (set these in the Render dashboard, not here) ----
      - key: MAIL_ENABLED
        value: "true"
      - key: MAIL_HOST
        value: smtp.hostinger.com
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_SSL
        value: "true"
      - key: MAIL_STARTTLS
        value: "false"
      - key: MAIL_FROM
        value: business@wevsync.com
      - key: MAIL_USERNAME
        sync: false                   # fill in dashboard
      - key: MAIL_PASSWORD
        sync: false                   # fill in dashboard (secret)

databases:
  - name: sparkmatch-db
    plan: free
    databaseName: sparkmatch
    user: sparkmatch
