# Dev profile overrides
spring:
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:localhost}:3307/sparkmatch?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${SPRING_DATASOURCE_USERNAME:sparkmatch}
    password: ${SPRING_DATASOURCE_PASSWORD:sparkmatch123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

app:
  seed:
    enabled: true   # seed demo users/profiles/matches on first run (dev only)

logging:
  level:
    com.sparkmatch: DEBUG
    org.hibernate.SQL: DEBUG
