# ================================================
# Production profile — driven entirely by env vars
# Used when SPRING_PROFILES_ACTIVE=prod (e.g. on Railway/Render/VPS)
# ================================================
spring:
  datasource:
    # Connection comes from ONE of:
    #   1. A single URL var (DATABASE_URL) in postgres://user:pass@host:port/db
    #      or mysql://... form — auto-split + converted to a JDBC url by
    #      DatabaseUrlEnvironmentPostProcessor (works on Render/Railway/Koyeb).
    #   2. The individual SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD vars.
    # Driver is auto-selected by Hibernate from the JDBC url, so both
    # PostgreSQL (prod) and MySQL work without code changes.
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      # Be patient with a cloud DB that may take a moment to accept connections.
      connection-timeout: 30000
      # Don't kill the whole app at boot if the DB is briefly unreachable;
      # keep retrying instead of crashing the container.
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      # Auto-create/update tables on first boot so you don't have to run schema.sql.
      ddl-auto: update
    show-sql: false
    # Keep open-in-view ON (Spring's default) so lazy associations resolve in the
    # response-mapping layer — matches the dev profile where everything works.
    open-in-view: true

  flyway:
    enabled: false

  # Redis is optional — the code doesn't require it.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Don't auto-configure Redis at all unless explicitly enabled — avoids any
  # startup connection attempts to a Redis that doesn't exist on free hosting.
  autoconfigure:
    exclude: ${REDIS_AUTOCONFIG_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration}

# Actuator: expose health, and make the probe DB-aware but resilient.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    redis:
      enabled: false
    # DB down shouldn't make the whole app report DOWN to the load balancer;
    # the app still serves traffic and Hikari retries.
    db:
      enabled: ${HEALTH_DB_ENABLED:true}

app:
  # Seed demo data on first prod boot ONLY if you explicitly opt in.
  seed:
    enabled: ${APP_SEED_ENABLED:false}
  # Where uploaded photos are served from. Point CDN_BASE_URL at your public host.
  cdn:
    base-url: ${CDN_BASE_URL:}

logging:
  level:
    com.sparkmatch: INFO
