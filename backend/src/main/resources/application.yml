# ================================================
# SparkMatch Application Configuration
# ================================================

spring:
  application:
    name: sparkmatch

  # Email (SMTP) — values come from env so credentials aren't committed.
  mail:
    host: ${MAIL_HOST:smtp.hostinger.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Explicit SSL socket factory — required for port 465 to actually
          # connect on some cloud hosts (Render); without it Spring "sends" but
          # the socket never establishes.
          ssl:
            enable: ${MAIL_SSL:true}
            trust: ${MAIL_HOST:smtp.hostinger.com}
          socketFactory:
            port: ${MAIL_PORT:465}
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          starttls:
            enable: ${MAIL_STARTTLS:false}
          connectiontimeout: 20000
          timeout: 20000
          writetimeout: 20000
        transport:
          protocol: smtp

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Dialect intentionally NOT set — Hibernate auto-detects it from the JDBC
        # connection (MySQL in dev, PostgreSQL in prod).
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

  # File Upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Redis
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 5000

# ================================================
# Server
# ================================================
server:
  # Railway/Render inject a PORT env var; bind to it when present.
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ================================================
# JWT Configuration
# ================================================
app:
  jwt:
    secret: ${JWT_SECRET:myUltraSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm2024}
    access-token-expiration-ms: 3600000      # 1 hour
    refresh-token-expiration-ms: 2592000000  # 30 days

  # OTP
  otp:
    expiry-minutes: 5
    max-attempts: 3
    length: 6

  # AWS S3
  aws:
    s3:
      bucket: sparkmatch-media
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_S3_ENDPOINT:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

  # CDN — empty by default so uploaded photos are served by this backend at
  # /photos/** (see WebMvcConfig). Set CDN_BASE_URL only when using real S3/CDN.
  cdn:
    base-url: ${CDN_BASE_URL:}

  # Transactional email. When enabled=false (default), emails are only logged —
  # so OTP flows work in dev without real SMTP. Set MAIL_ENABLED=true + creds in prod.
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:business@wevsync.com}
    from-name: ${MAIL_FROM_NAME:SparkMatch}
    # Brevo transactional email API key. When set, email is sent over HTTPS via
    # Brevo (works on hosts that block SMTP, e.g. Render). Preferred over SMTP.
    brevo-key: ${BREVO_API_KEY:}

  # CORS — comma-separated origins. "*" is fine for the mobile app; set your
  # website domain(s) in production (e.g. https://yourdomain.com).
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

  # Matching
  matching:
    default-distance-km: 50
    max-distance-km: 160
    daily-swipe-limit: 100
    daily-super-like-limit: 1
    premium-super-like-limit: 5

  # Demo data seeding — disable in production via APP_SEED_ENABLED=false
  seed:
    enabled: ${APP_SEED_ENABLED:false}

# ================================================
# API Docs
# ================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method

# ================================================
# Logging
# ================================================
logging:
  level:
    com.sparkmatch: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
