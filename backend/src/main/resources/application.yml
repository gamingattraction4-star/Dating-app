# ================================================
# SparkMatch Application Configuration
# ================================================

spring:
  application:
    name: sparkmatch

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: UTC

  # File Upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Redis
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 5000

# ================================================
# Server
# ================================================
server:
  # Railway/Render inject a PORT env var; bind to it when present.
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# ================================================
# JWT Configuration
# ================================================
app:
  jwt:
    secret: ${JWT_SECRET:myUltraSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm2024}
    access-token-expiration-ms: 3600000      # 1 hour
    refresh-token-expiration-ms: 2592000000  # 30 days

  # OTP
  otp:
    expiry-minutes: 5
    max-attempts: 3
    length: 6

  # AWS S3
  aws:
    s3:
      bucket: sparkmatch-media
      region: ${AWS_REGION:us-east-1}
      endpoint: ${AWS_S3_ENDPOINT:}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

  # CDN
  cdn:
    base-url: ${CDN_BASE_URL:http://localhost:4566/sparkmatch-media}

  # Matching
  matching:
    default-distance-km: 50
    max-distance-km: 160
    daily-swipe-limit: 100
    daily-super-like-limit: 1
    premium-super-like-limit: 5

  # Demo data seeding — disable in production via APP_SEED_ENABLED=false
  seed:
    enabled: ${APP_SEED_ENABLED:false}

# ================================================
# API Docs
# ================================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: method

# ================================================
# Logging
# ================================================
logging:
  level:
    com.sparkmatch: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
